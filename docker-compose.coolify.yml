# GoClaw VPS Deployment (8GB/4vCPU optimized)
#
# Uses shared Traefik reverse proxy (external traefik-public network)
# Chrome browser disabled by default — enable with: --profile chrome
#
# Prerequisites:
#   docker network create traefik-public
#   Traefik running at /opt/traefik
#
# Required env vars in .env:
#   POSTGRES_PASSWORD, GOCLAW_ENCRYPTION_KEY, GOCLAW_GATEWAY_TOKEN
#   API_DOMAIN, DASHBOARD_DOMAIN
#
# Deploy: docker compose -f docker-compose.coolify.yml up -d --build

services:
  # PostgreSQL 18 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg18
    container_name: goclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: goclaw
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goclaw-internal

  # Redis for caching and performance
  redis:
    image: redis:7-alpine
    container_name: goclaw-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goclaw-internal

  # Chrome browser for automation (OPTIONAL — disabled by default)
  # Enable with: docker compose -f docker-compose.coolify.yml --profile chrome up -d
  chrome:
    image: browserless/chrome:latest
    container_name: goclaw-chrome
    restart: unless-stopped
    profiles:
      - chrome
    environment:
      CONNECTION_TIMEOUT: 600000
      MAX_CONCURRENT_SESSIONS: 2
      ENABLE_DEBUGGER: "false"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - goclaw-internal

  # GoClaw Gateway — lean build (no Python/Node unless needed)
  goclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_PYTHON: "false"
        ENABLE_REDIS: "true"
        ENABLE_OTEL: "false"
    container_name: goclaw-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.goclaw-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.goclaw-api.entrypoints=websecure"
      - "traefik.http.routers.goclaw-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.goclaw-api.loadbalancer.server.port=18790"
    environment:
      # Database
      GOCLAW_POSTGRES_DSN: postgres://goclaw:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/goclaw?sslmode=disable

      # Security - REQUIRED
      GOCLAW_ENCRYPTION_KEY: ${GOCLAW_ENCRYPTION_KEY}
      GOCLAW_GATEWAY_TOKEN: ${GOCLAW_GATEWAY_TOKEN}

      # Redis
      GOCLAW_REDIS_URL: redis://redis:6379

      # Browser automation (only works if chrome profile is active)
      BROWSER_CDP_URL: ws://chrome:3000

      # Gateway configuration
      GOCLAW_PORT: ${GOCLAW_PORT:-18790}
      GOCLAW_HOST: 0.0.0.0

      # LLM Provider API Keys
      GOCLAW_OPENAI_API_KEY: ${GOCLAW_OPENAI_API_KEY:-}
      GOCLAW_ANTHROPIC_API_KEY: ${GOCLAW_ANTHROPIC_API_KEY:-}
      GOCLAW_OPENROUTER_API_KEY: ${GOCLAW_OPENROUTER_API_KEY:-}
      GOCLAW_GROQ_API_KEY: ${GOCLAW_GROQ_API_KEY:-}
      GOCLAW_GEMINI_API_KEY: ${GOCLAW_GEMINI_API_KEY:-}
      GOCLAW_DEEPSEEK_API_KEY: ${GOCLAW_DEEPSEEK_API_KEY:-}
      GOCLAW_MISTRAL_API_KEY: ${GOCLAW_MISTRAL_API_KEY:-}
      GOCLAW_XAI_API_KEY: ${GOCLAW_XAI_API_KEY:-}
      GOCLAW_MINIMAX_API_KEY: ${GOCLAW_MINIMAX_API_KEY:-}
      GOCLAW_COHERE_API_KEY: ${GOCLAW_COHERE_API_KEY:-}
      GOCLAW_PERPLEXITY_API_KEY: ${GOCLAW_PERPLEXITY_API_KEY:-}
      GOCLAW_DASHSCOPE_API_KEY: ${GOCLAW_DASHSCOPE_API_KEY:-}
      GOCLAW_BAILIAN_API_KEY: ${GOCLAW_BAILIAN_API_KEY:-}
      GOCLAW_OLLAMA_CLOUD_API_KEY: ${GOCLAW_OLLAMA_CLOUD_API_KEY:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - goclaw_data:/app/data
      - goclaw_skills:/app/skills
      - goclaw_memory:/app/memory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - goclaw-internal
      - traefik-public

  # Web Dashboard UI
  dashboard:
    build:
      context: ./ui/web
      dockerfile: Dockerfile
    container_name: goclaw-dashboard
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.goclaw-dash.rule=Host(`${DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.goclaw-dash.entrypoints=websecure"
      - "traefik.http.routers.goclaw-dash.tls.certresolver=letsencrypt"
      - "traefik.http.services.goclaw-dash.loadbalancer.server.port=80"
    environment:
      VITE_GOCLAW_API_BASE: ${VITE_GOCLAW_API_BASE:-https://api.goclaw.abdarwish.com}
      VITE_GOCLAW_WS_BASE: ${VITE_GOCLAW_WS_BASE:-wss://api.goclaw.abdarwish.com}
    depends_on:
      - goclaw
    networks:
      - goclaw-internal
      - traefik-public

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  goclaw_data:
    driver: local
  goclaw_skills:
    driver: local
  goclaw_memory:
    driver: local

networks:
  goclaw-internal:
    driver: bridge
  traefik-public:
    external: true
